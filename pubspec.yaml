name: check_var
description: "CheckVar - Scam call detection and verification."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.2.1
  path_provider: ^2.1.3
  easy_localization: ^3.0.7
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  adaptive_icon_background: "#0D5053"
  adaptive_icon_foreground: "logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/models/gate_tfidf_config.json
    - assets/models/gate_classifier_weights.json
    - assets/models/tfidf_config.json
    - assets/models/classifier_weights.json
    - assets/translations/
    - assets/images/CheckVar-Logo.png
    - assets/audio/
    - assets/scam_advice.json
    - .env
